<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot — Hỏi đáp về AI & AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: radial-gradient(1200px 800px at 10% 10%, #0f2a1f 0%, #071912 40%, #030b08 100%);
      color: #e7efe9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- LOGIN SCREEN ---------- */
    #loginScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(12, 28, 22, 0.85);
      border: 1px solid rgba(46, 160, 107, 0.25);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #7be0a8;
    }
    .login-card p {
      color: #9fb6a8;
      margin-bottom: 22px;
      font-size: 14px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(127, 200, 160, 0.25);
      background: #0a1a13;
      color: #e7efe9;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }
    .login-card input:focus { border-color: #5fd79a; }
    .login-card button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #2ea06b, #1f7a50);
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform .05s ease, opacity .2s ease;
    }
    .login-card button:hover { opacity: .92; }
    .login-card button:active { transform: translateY(1px); }
    .login-card button:disabled { opacity: .5; cursor: not-allowed; }
    .error {
      color: #ff8b8b;
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ---------- CHAT SCREEN ---------- */
    #chatScreen {
      display: none;
      flex: 1;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 4px 14px;
      border-bottom: 1px solid rgba(127, 200, 160, 0.15);
      margin-bottom: 12px;
    }
    .chat-header h2 {
      font-size: 16px;
      color: #7be0a8;
      font-weight: 600;
    }
    .chat-header button {
      background: transparent;
      color: #9fb6a8;
      border: 1px solid rgba(127, 200, 160, 0.25);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .chat-header button:hover { color: #fff; border-color: #5fd79a; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, #2ea06b, #1f7a50);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: rgba(18, 40, 30, 0.9);
      border: 1px solid rgba(127, 200, 160, 0.15);
      color: #e7efe9;
      border-bottom-left-radius: 4px;
    }
    .msg.bot.loading { color: #9fb6a8; font-style: italic; }

    #chatForm {
      display: flex;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(127, 200, 160, 0.15);
    }
    #messageInput {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(127, 200, 160, 0.25);
      background: #0a1a13;
      color: #e7efe9;
      font-size: 15px;
      outline: none;
    }
    #messageInput:focus { border-color: #5fd79a; }
    #chatForm button {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #2ea06b, #1f7a50);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    #chatForm button:disabled { opacity: .5; cursor: not-allowed; }

    .hint {
      font-size: 12px;
      color: #6f8579;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <section id="loginScreen">
    <form class="login-card" id="loginForm" autocomplete="off">
      <h1>🤖 AI Chatbot</h1>
      <p>Hỏi đáp mọi thứ về AI & AI Agent. Vui lòng nhập mật khẩu để truy cập.</p>
      <input type="password" id="passwordInput" placeholder="Mật khẩu truy cập" required />
      <button type="submit" id="loginBtn">Vào chat</button>
      <div class="error" id="loginError"></div>
    </form>
  </section>

  <!-- CHAT -->
  <section id="chatScreen">
    <div class="chat-header">
      <h2>🤖 AI Chatbot · Hỏi đáp AI & AI Agent</h2>
      <button id="logoutBtn">Đăng xuất</button>
    </div>
    <div id="messages"></div>
    <form id="chatForm" autocomplete="off">
      <input type="text" id="messageInput" placeholder="Hỏi gì đó về AI, LLM, AI Agent..." required />
      <button type="submit" id="sendBtn">Gửi</button>
    </form>
    <div class="hint">API key được bảo vệ server-side · không hiển thị trong trình duyệt</div>
  </section>

  <script>
    // In-memory session (không dùng localStorage để tránh rò rỉ nếu máy dùng chung)
    let sessionPassword = "";
    const conversation = []; // [{role, content}]

    const loginScreen = document.getElementById("loginScreen");
    const chatScreen  = document.getElementById("chatScreen");
    const loginForm   = document.getElementById("loginForm");
    const loginBtn    = document.getElementById("loginBtn");
    const loginError  = document.getElementById("loginError");
    const passwordInput = document.getElementById("passwordInput");

    const chatForm    = document.getElementById("chatForm");
    const sendBtn     = document.getElementById("sendBtn");
    const messageInput= document.getElementById("messageInput");
    const messagesEl  = document.getElementById("messages");
    const logoutBtn   = document.getElementById("logoutBtn");

    function appendMessage(role, content, extraClass = "") {
      const div = document.createElement("div");
      div.className = `msg ${role} ${extraClass}`.trim();
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // ---------- Login ----------
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginError.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "Đang kiểm tra...";
      const pwd = passwordInput.value;

      try {
        const res = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pwd }),
        });
        if (res.ok) {
          sessionPassword = pwd;
          loginScreen.style.display = "none";
          chatScreen.style.display = "flex";
          appendMessage(
            "bot",
            "Xin chào! Mình là AI Chatbot — sẵn sàng giải đáp mọi thắc mắc về AI và AI Agent. Bạn muốn hỏi gì nào?"
          );
          messageInput.focus();
        } else if (res.status === 401) {
          loginError.textContent = "Mật khẩu không đúng. Thử lại nhé.";
        } else {
          loginError.textContent = "Lỗi kết nối server. Vui lòng thử lại.";
        }
      } catch (err) {
        loginError.textContent = "Không thể kết nối tới server.";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Vào chat";
      }
    });

    // ---------- Logout ----------
    logoutBtn.addEventListener("click", () => {
      sessionPassword = "";
      conversation.length = 0;
      messagesEl.innerHTML = "";
      passwordInput.value = "";
      chatScreen.style.display = "none";
      loginScreen.style.display = "flex";
    });

    // ---------- Chat ----------
    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      appendMessage("user", text);
      conversation.push({ role: "user", content: text });
      messageInput.value = "";
      sendBtn.disabled = true;
      const loader = appendMessage("bot", "Đang suy nghĩ...", "loading");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            password: sessionPassword,
            messages: conversation.slice(-12), // giữ 12 turn gần nhất
          }),
        });
        const data = await res.json();
        loader.remove();

        if (!res.ok) {
          appendMessage("bot", "⚠️ " + (data.error || "Có lỗi xảy ra."));
          return;
        }
        conversation.push({ role: "assistant", content: data.reply });
        appendMessage("bot", data.reply);
      } catch (err) {
        loader.remove();
        appendMessage("bot", "⚠️ Không thể kết nối tới server.");
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });
  </script>
</body>
</html>
